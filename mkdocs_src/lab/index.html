<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuAIRLab - 进入实验室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            font-size: 3em;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .button-group {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }
        .btn-secondary:hover {
            background: #e8e8e8;
        }
        .info {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            border-radius: 4px;
            color: #666;
            font-size: 0.9em;
            line-height: 1.6;
        }
        .info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔬</div>
        <h1>QuAIRLab</h1>
        <p class="subtitle">量子计算实验平台</p>
        
        <div class="button-group">
            <!-- 内网版本 -->
            <a href="http://10.4.15.37:8080/" class="btn btn-primary">
                进入 QuAIRLab（内网）
            </a>
            
            <!-- 提示：生产版本未就绪 -->
            <button class="btn btn-secondary" disabled style="opacity: 0.6; cursor: not-allowed;">
                进入 QuAIRLab（公网版 - 敬请期待）
            </button>
        </div>

        <div class="info">
            <strong>💡 提示：</strong><br>
            当前 QuAIRLab 以完整子路径方式集成到 quairkit.com 的工作正在进行中。<br>
            目前可通过内网地址访问完整功能。<br>
            <br>
            <strong>📅 计划：</strong>
            公网集成完成后，点击"公网版"按钮即可直接访问。
        </div>
    </div>
</body>
</html>
